<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Asistencia QR PRO</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  background:#0f172a;
  color:#fff;
  font-family:'Segoe UI';
  text-align:center;
}

.header{
  padding:10px;
  background:#1e293b;
}

#reader{
  width:90%;
  max-width:320px;
  margin:15px auto;
  border:3px solid #22c55e;
  border-radius:12px;
}

/* FOTO */
.foto{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  margin:10px auto;
  border:3px solid #fff;
}

/* PANEL */
.panel{
  background:#111827;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

.nombre{
  font-size:18px;
  font-weight:bold;
}

.estado{
  font-size:22px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">📷 Asistencia 3ro C</div>

<div id="reader"></div>

<div class="panel">
  <img id="foto" class="foto" src="" style="display:none;">
  <div id="nombre" class="nombre"></div>
  <div id="estado" class="estado"></div>
</div>

<script src="app.js"></script>

</body>
</html>
